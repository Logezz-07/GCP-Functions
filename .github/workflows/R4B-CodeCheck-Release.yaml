name: R4B-CodeCheck and Release

on:
  workflow_dispatch:

jobs:
  R4B-CodeCheck-Release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Dev Branch
      - name: Checkout Dev
        uses: actions/checkout@v3
        with:
          ref: dev
          fetch-depth: 0

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Run TypeScript Syntax Check
      - name: Run TypeScript Syntax Check
        run: |
          npm run check-syntax
          echo "✅ TypeScript syntax check completed successfully!"

      # 5️⃣ Create Release Branch and Push Everything
      - name: Create Release Branch and Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          echo "🚀 Creating Release Branch"
          git fetch origin dev
          git checkout -B release origin/dev

          echo "📦 Staging all files..."
          git add .

          # Check if there is anything to commit
          if ! git diff --cached --quiet; then
            echo "💾 Committing all changes..."
            git commit -m "New Commit From Dev"

            echo "⬆️ Pushing release branch..."
            git push origin release --force

            echo "🏷 Generating new version tag..."
            LATEST_TAG=$(git tag --list "R4B-Function-v*" --sort=-v:refname | head -n1)
            if [ -z "$LATEST_TAG" ]; then
              NEXT_VERSION=1
            else
              NUM=$(echo $LATEST_TAG | sed 's/R4B-Function-v//')
              NEXT_VERSION=$((NUM + 1))
            fi

            VERSION="R4B-Function-v$NEXT_VERSION"
            git tag $VERSION
            git push origin $VERSION
            echo "✅ Tag $VERSION created and pushed successfully!"

          else
            echo "ℹ️ Nothing to commit, skipping push and tagging"
            VERSION=$(git tag --sort=-v:refname | head -n1)
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
