name: R4B-CodeCheck and Release

on:
  workflow_dispatch:

jobs:
  R4B-CodeCheck-Release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Dev Branch
      - name: Checkout Dev
        uses: actions/checkout@v3
        with:
          ref: dev
          fetch-depth: 0  # fetch full history to access all commits and tags

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Run TypeScript Syntax Check
      - name: Run TypeScript Syntax Check
        run: |
          npm run check-syntax
          echo "✅ TypeScript syntax check completed successfully!"

      # 5️⃣ Create/Update Release Branch and Push
      - name: Create/Update Release Branch and Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git user
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          echo "🚀 Fetching latest dev commits"
          git fetch origin dev

          # Force release branch to match latest dev
          git checkout -B release
          git reset --hard origin/dev

          # Generate next version tag
          echo "🏷 Generating new version tag..."
          LATEST_TAG=$(git tag --list "R4B-Function-v*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION=1
          else
            NUM=$(echo $LATEST_TAG | sed 's/R4B-Function-v//')
            NEXT_VERSION=$((NUM + 1))
          fi
          VERSION="R4B-Function-v$NEXT_VERSION"
          git tag $VERSION

          # Push release branch and tag 
          echo "⬆️ Pushing release branch and tag to origin"
          git push origin release --force
          git push origin $VERSION

          echo "✅ Release branch updated and tag $VERSION pushed successfully!"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
