name: R4B-CodeCheck and Release

on:
  workflow_dispatch:

jobs:
  R4B-CodeCheck-Release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Dev Branch
      - name: Checkout Dev
        uses: actions/checkout@v3
        with:
          ref: dev
          fetch-depth: 0  # fetch full history to access all commits and tags

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Run TypeScript Syntax Check
      - name: Run Code Check
        run: |
          npm run check-syntax
          echo "✅ Code Check Completed Successfully!"

      # 5️⃣ Create/Update Release Branch and Tag
      - name: Create/Update Release Branch and Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git identity
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          echo "🚀 Checking out dev branch and pulling latest changes"
          git checkout dev
          git pull origin dev

          echo "🔀 Creating or updating release branch"
          git checkout -B release

          echo "⬆️ Pushing release branch to origin"
          PUSH_OUTPUT=$(git push origin release --force 2>&1)
          echo "$PUSH_OUTPUT"

          if [[ "$PUSH_OUTPUT" == *"Everything up-to-date"* ]]; then
            echo "ℹ️ Release branch already up-to-date. Skipping versioning."
          else
            echo "💾 Release branch updated. Generating new version tag..."

            # Generate next version tag
            LATEST_TAG=$(git tag --list "R4B-Function-v*" --sort=-v:refname | head -n1)
            if [ -z "$LATEST_TAG" ]; then
              NEXT_VERSION=1
            else
              NUM=$(echo "$LATEST_TAG" | sed 's/R4B-Function-v//')
              NEXT_VERSION=$((NUM + 1))
            fi
            VERSION="R4B-Function-v$NEXT_VERSION"

            echo "🏷 Pushing new version tag: $VERSION"
            git tag "$VERSION"
            git push origin "$VERSION"

            echo "✅ Release branch updated and tag $VERSION pushed successfully!"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi
