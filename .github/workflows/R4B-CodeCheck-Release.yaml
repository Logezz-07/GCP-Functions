name: R4B-CodeCheck and Release

on:
  workflow_dispatch:

jobs:
  R4B-CodeCheck-Release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Dev Branch
      - name: Checkout Dev
        uses: actions/checkout@v3
        with:
          ref: dev
          fetch-depth: 0  # fetch full history to access all commits and tags

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Run TypeScript Syntax Check
      - name: Run TypeScript Syntax Check
        run: |
          npm run check-syntax
          echo "✅ TypeScript syntax check completed successfully!"

      # 5️⃣ Create/Update Release Branch and Push
      - name: Create/Update Release Branch and Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git user
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          echo "🚀 Fetching latest dev commits"
          git fetch origin dev

          # Force release branch to match latest dev
          echo "🔄 Resetting release branch to match dev"
          git checkout -B release
          git reset --hard origin/dev

          # Stage workflow-generated changes (if any)
          git add .
          if ! git diff --cached --quiet; then
            echo "💾 Committing workflow-generated changes..."
            git commit -m "New Commit From Dev"
          else
            echo "ℹ️ No workflow-generated changes to commit."
          fi

          # Push release branch to remote (always)
          echo "⬆️ Pushing release branch to origin"
          git push origin release --force

          # Generate next version tag
          echo "🏷 Generating new version tag..."
          LATEST_TAG=$(git tag --list "R4B-Function-v*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION=1
          else
            NUM=$(echo $LATEST_TAG | sed 's/R4B-Function-v//')
            NEXT_VERSION=$((NUM + 1))
          fi
          VERSION="R4B-Function-v$NEXT_VERSION"

          git tag $VERSION
          git push origin $VERSION
          echo "✅ Tag $VERSION created and pushed successfully!"

          # Output version for downstream steps
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
