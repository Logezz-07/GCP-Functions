name: R4B-Deploy Cloud Functions

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: 'Git tag or commit to checkout'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_tag }}

      # 2️⃣ Authenticate to Google Cloud
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3️⃣ Secure Artifact Registry Login (no .npmrc file)
      - name: Artifact Registry Login (Secure)
        run: |
          echo "🔐 Authenticating npm to Artifact Registry..."

          # Set the scoped registry URL
          npm config set @roger:registry "https://us-central1-npm.pkg.dev/roger-470808/r4b-common-nodemodules/"

          

          # Set auth token for that registry dynamically
          npm config set "//us-central1-npm.pkg.dev/roger-470808/r4b-common-nodemodules/:_authToken" "$(gcloud auth print-access-token)"

          echo "✅ Artifact Registry authentication completed!"

      # 4️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 5️⃣ Terraform Init
      - name: Terraform Init
        working-directory: teraform
        run: terraform init

      # 6️⃣ Terraform Plan
      - name: Terraform Plan
        working-directory: teraform
        run: |
          FUNCTIONS_LIST=$(echo "${{ secrets.FUNCTIONS_LIST }}" | sed 's/\([^,]*\)/"&"/g')
          echo "🧩 Functions to deploy: [$FUNCTIONS_LIST]"
          terraform plan \
            -var="project_id=${{ secrets.GOOGLE_FUNCTIONS_PROJECT_ID }}" \
            -var="region=${{ secrets.GOOGLE_FUNCTIONS_REGION }}" \
            -var="functions=[$FUNCTIONS_LIST]"

      # 7️⃣ Terraform Apply
      - name: Terraform Apply
        working-directory: teraform
        run: |
          FUNCTIONS_LIST=$(echo "${{ secrets.FUNCTIONS_LIST }}" | sed 's/\([^,]*\)/"&"/g')
          echo "🚀 Applying deployment for functions: [$FUNCTIONS_LIST]"
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GOOGLE_FUNCTIONS_PROJECT_ID }}" \
            -var="region=${{ secrets.GOOGLE_FUNCTIONS_REGION }}" \
            -var="functions=[$FUNCTIONS_LIST]"
